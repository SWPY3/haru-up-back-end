<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat Test v3</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --panel: #ffffff;
      --line: #e5e2da;
      --ink: #222018;
      --muted: #6a6459;
      --bot: #fff6e9;
      --user: #eef2ff;
      --accent: #111827;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at right top, #fce3c0 0%, transparent 28%), var(--bg);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 28px 16px 32px;
    }

    .hero {
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 30px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
    }

    .meta {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .meta code {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--ink);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.05);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .toolbar .left {
      font-weight: 700;
    }

    .toolbar .right {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 12px;
      font: inherit;
      cursor: pointer;
      padding: 9px 12px;
    }

    .toolbar button {
      background: #f3f4f6;
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .toolbar button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .messages {
      min-height: 420px;
      max-height: 58vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-right: 2px;
    }

    .bubble {
      max-width: 84%;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.5;
    }

    .bubble.bot {
      align-self: flex-start;
      background: var(--bot);
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--user);
    }

    .status {
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .composer {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .composer input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 13px;
      font: inherit;
    }

    .composer button {
      background: var(--accent);
      color: #fff;
      padding-inline: 16px;
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 680px) {
      .panel {
        padding: 12px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      .bubble {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <h1>챗봇 브라우저 테스트</h1>
    <p>Version v3: 고정 질문 4단계(목표 → 실력 → 기간 → 하루 투자 시간)</p>
    <div class="meta">
      <span>Page <code>/chat-test.html</code></span>
      <span>API <code>POST /api/chat/test</code></span>
      <span>Session <code id="sessionIdLabel">-</code></span>
    </div>
  </section>

  <section class="panel">
    <div class="toolbar">
      <div class="left">Browser Chat</div>
      <div class="right">
        <button id="restartButton" type="button">같은 세션 재시작(reset)</button>
        <button id="newSessionButton" class="primary" type="button">새 세션 시작</button>
      </div>
    </div>

    <div id="messages" class="messages"></div>
    <div id="statusText" class="status">연결 준비 중...</div>

    <form id="chatForm" class="composer">
      <input id="messageInput" type="text" autocomplete="off" placeholder="답변 입력">
      <button id="sendButton" type="submit">보내기</button>
    </form>

    <div class="hint">브라우저 캐시로 예전 페이지가 보이면 강력 새로고침(Ctrl+F5)을 해주세요.</div>
  </section>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const statusEl = document.getElementById("statusText");
  const sessionIdLabelEl = document.getElementById("sessionIdLabel");
  const chatFormEl = document.getElementById("chatForm");
  const messageInputEl = document.getElementById("messageInput");
  const sendButtonEl = document.getElementById("sendButton");
  const restartButtonEl = document.getElementById("restartButton");
  const newSessionButtonEl = document.getElementById("newSessionButton");

  let sessionId = createSessionId();
  let waiting = false;
  sessionIdLabelEl.textContent = sessionId;

  chatFormEl.addEventListener("submit", async (event) => {
    event.preventDefault();
    if (waiting) return;
    const content = messageInputEl.value.trim();
    if (!content) return;
    appendMessage("user", content);
    messageInputEl.value = "";
    await sendMessage(content);
  });

  restartButtonEl.addEventListener("click", async () => {
    if (waiting) return;
    appendMessage("user", "reset");
    await sendMessage("reset");
  });

  newSessionButtonEl.addEventListener("click", async () => {
    if (waiting) return;
    sessionId = createSessionId();
    sessionIdLabelEl.textContent = sessionId;
    clearMessages();
    await bootstrap();
  });

  function createSessionId() {
    if (window.crypto && typeof window.crypto.randomUUID === "function") {
      return window.crypto.randomUUID();
    }
    const random = Math.random().toString(36).slice(2, 10);
    return `chat-${Date.now().toString(36)}-${random}`;
  }

  function clearMessages() {
    messagesEl.innerHTML = "";
  }

  function appendMessage(role, text) {
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    messagesEl.appendChild(bubble);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(isLoading) {
    waiting = isLoading;
    messageInputEl.disabled = isLoading;
    sendButtonEl.disabled = isLoading;
    restartButtonEl.disabled = isLoading;
    newSessionButtonEl.disabled = isLoading;
  }

  function setStatus(payload) {
    statusEl.textContent = `nextDepth=${payload.nextDepth} | completed=${payload.completed}`;
  }

  async function sendMessage(content) {
    setLoading(true);
    try {
      const response = await fetch("/api/chat/test", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({sessionId, content})
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const payload = await response.json();
      appendMessage("bot", payload.message || "");
      setStatus(payload);
    } catch (error) {
      appendMessage("bot", `요청 실패: ${error.message}`);
      statusEl.textContent = "요청 실패";
    } finally {
      setLoading(false);
      messageInputEl.focus();
    }
  }

  async function bootstrap() {
    statusEl.textContent = "초기 질문 로딩 중...";
    await sendMessage("");
  }

  bootstrap().catch((error) => {
    appendMessage("bot", `초기화 실패: ${error.message}`);
    statusEl.textContent = "초기화 실패";
  });
</script>
</body>
</html>
